<script type="text/javascript">
//<![CDATA[
    let totalScore = parseInt(localStorage.getItem('user_gold_balance')) || 0;
    const targetGoal = 100000; 
    const MY_PREMIUM_AD_LINK = "https://www.effectivecpmnetwork.com/s3j510v7bj?key=dee0fe91a3a746f56ec764425e17dd8d";

    const triggerAdBtn = document.getElementById('triggerAdBtn');
    const adViewport = document.getElementById('adViewport');
    const adLoadingProgress = document.getElementById('adLoadingProgress');
    const adTimerClock = document.getElementById('adTimerClock');
    const coinCounter = document.getElementById('coinCounter');
    const progressBar = document.getElementById('progressBar');
    const progressPercent = document.getElementById('progressPercent');
    const claimRewardBtn = document.getElementById('claimRewardBtn');
    const instaUser = document.getElementById('instaUser');

    window.addEventListener('DOMContentLoaded', () => {
        updateDisplay(totalScore);
        syncSystemDashboard();
    });

    triggerAdBtn.addEventListener('click', () => {
        adViewport.style.display = 'flex';
        adLoadingProgress.style.width = '0%';
        let secondsLeft = 3; 
        adTimerClock.innerText = `Validating... ${secondsLeft}s`;
        
        try { window.open(MY_PREMIUM_AD_LINK, '_blank'); } catch(e){}

        setTimeout(() => {
            adLoadingProgress.style.transition = 'width 3s linear';
            adLoadingProgress.style.width = '100%';
        }, 50);

        const adLoop = setInterval(() => {
            secondsLeft--;
            adTimerClock.innerText = `Validating... ${secondsLeft}s`;
            if(secondsLeft <= 0) {
                clearInterval(adLoop);
                adViewport.style.display = 'none'; 
                totalScore += 1000;
                localStorage.setItem('user_gold_balance', totalScore);
                updateDisplay(totalScore);
                syncSystemDashboard();
            }
        }, 1000);
    });

    function updateDisplay(val) {
        coinCounter.innerText = val.toLocaleString('en-US', { minimumIntegerDigits: 6, useGrouping: true });
    }

    function syncSystemDashboard() {
        let percent = (totalScore / targetGoal) * 100;
        if(percent > 100) percent = 100;
        progressBar.style.width = percent + '%';
        progressPercent.innerText = Math.floor(percent);

        if(totalScore >= targetGoal) {
            claimRewardBtn.disabled = false;
            claimRewardBtn.classList.add('unlocked');
            claimRewardBtn.innerText = '🚀 Claim 10K Followers Now!';
        } else {
            claimRewardBtn.disabled = true;
            claimRewardBtn.classList.remove('unlocked');
            claimRewardBtn.innerText = '🔒 Claim 10K Followers';
        }
    }

    claimRewardBtn.addEventListener('click', () => {
        const username = instaUser.value.trim();
        if(username === "") { alert("Please input Instagram username!"); return; }
        alert(`Success!\nOrder queued for: ${username}`);
        totalScore -= targetGoal;
        localStorage.setItem('user_gold_balance', totalScore);
        updateDisplay(totalScore);
        syncSystemDashboard();
    });
//]]>
</script>
